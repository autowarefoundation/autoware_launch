autoware_system_design_format: 0.3.0

name: universe_control.parameter_set
parameters:
  - node: /control/trajectory_follower
    param_files:
      - param_path: $(find-pkg-share autoware_launch)/config/control/trajectory_follower/trajectory_follower_node.param.yaml
      - param_path: $(find-pkg-share autoware_launch)/config/control/trajectory_follower/lateral/mpc.param.yaml
      - param_path: $(find-pkg-share autoware_launch)/config/control/trajectory_follower/longitudinal/pid.param.yaml
      - param_path: $(find-pkg-share autoware_launch)/config/control/common/nearest_search.param.yaml
    param_values:
      - name: lateral_controller_mode
        type: string
        value: mpc
      - name: longitudinal_controller_mode
        type: string
        value: pid
  - node: /control/shift_decider
    param_files:
      - param_path: $(find-pkg-share autoware_launch)/config/control/shift_decider/shift_decider.param.yaml
      - param_path: $(find-pkg-share autoware_launch)/config/control/common/nearest_search.param.yaml
  - node: /control/vehicle_cmd_gate
    param_files:
