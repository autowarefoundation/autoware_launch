      - param_path: $(find-pkg-share autoware_launch)/config/control/common/nearest_search.param.yaml
  - node: /control/operation_mode_transition_manager
    param_files:
      - param_path: $(find-pkg-share autoware_launch)/config/control/operation_mode_transition_manager/operation_mode_transition_manager.param.yaml
      - param_path: $(find-pkg-share autoware_launch)/config/control/common/nearest_search.param.yaml
  - node: /control/external_cmd_selector
    param_files:
      - param_path: $(find-pkg-share autoware_launch)/config/control/external_cmd_selector/external_cmd_selector.param.yaml
      - param_path: $(find-pkg-share autoware_launch)/config/control/common/nearest_search.param.yaml
  - node: /control/lane_departure_checker
    param_files:
      - param_path: $(find-pkg-share autoware_launch)/config/control/lane_departure_checker/lane_departure_checker.param.yaml
      - param_path: $(find-pkg-share autoware_launch)/config/control/common/nearest_search.param.yaml
  - node: /control/control_validator
    param_files:
