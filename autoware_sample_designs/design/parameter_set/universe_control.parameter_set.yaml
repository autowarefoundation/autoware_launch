      - param_path: $(find-pkg-share autoware_launch)/config/control/common/nearest_search.param.yaml
  - node: /control/autonomous_emergency_braking
    param_files:
      - param_path: $(find-pkg-share autoware_launch)/config/control/autoware_autonomous_emergency_braking/autonomous_emergency_braking.param.yaml
      - param_path: $(find-pkg-share autoware_launch)/config/control/common/nearest_search.param.yaml
  - node: /control/collision_detector
