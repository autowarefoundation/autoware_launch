autoware_system_design_format: 0.3.1

# module information
name: Planning.module

instances:
  - name: mission_planning
    entity: MissionPlanning.module
  - name: manual_lane_change_handler
    entity: ManualLaneChangeHandler.node
  - name: scenario_planning
    entity: ScenarioPlanning.module
  - name: planning_validator
    entity: PlanningValidator.node
  - name: planning_evaluator
    entity: PlanningEvaluator.node
  - name: remaining_distance_time_calculator
    entity: RemainingDistanceTimeCalculator.node

# interfaces
subscribers:
  - name: vector_map
  - name: odometry
  - name: acceleration
  - name: operation_mode_state
  - name: objects
  - name: pointcloud
  - name: occupancy_grid_map
  - name: traffic_signals
  - name: modified_goal

publishers:
  - name: trajectory
  - name: route
  - name: mission_planning/route
  - name: route_state
  - name: turn_indicators_cmd
  - name: hazard_lights_cmd
  - name: stop_reasons
  - name: scenario

servers:
  - name: clear_route
  - name: set_lanelet_route
  - name: set_waypoint_route

connections:
  - - subscriber.modified_goal
    - mission_planning.subscriber.modified_goal
  - - subscriber.vector_map
    - mission_planning.subscriber.vector_map
  - - subscriber.odometry
    - mission_planning.subscriber.odometry
  - - subscriber.operation_mode_state
    - mission_planning.subscriber.operation_mode_state
  - - mission_planning.publisher.route
    - manual_lane_change_handler.subscriber.route
  - - subscriber.odometry
    - manual_lane_change_handler.subscriber.odometry
  - - mission_planning.publisher.route
    - scenario_planning.subscriber.route
  - - subscriber.vector_map
    - scenario_planning.subscriber.vector_map
  - - subscriber.odometry
    - scenario_planning.subscriber.odometry
  - - subscriber.acceleration
    - scenario_planning.subscriber.acceleration
  - - subscriber.operation_mode_state
    - scenario_planning.subscriber.operation_mode_state
  - - subscriber.objects
    - scenario_planning.subscriber.perception_objects
  - - subscriber.pointcloud
    - scenario_planning.subscriber.pointcloud
  - - subscriber.occupancy_grid_map
    - scenario_planning.subscriber.occupancy_grid_map
  - - subscriber.traffic_signals
    - scenario_planning.subscriber.traffic_signals
  - - scenario_planning.publisher.trajectory
    - planning_validator.subscriber.trajectory
  - - subscriber.pointcloud
    - planning_validator.subscriber.pointcloud
  - - planning_validator.publisher.trajectory
    - planning_evaluator.subscriber.trajectory
  - - subscriber.odometry
    - planning_evaluator.subscriber.odometry
  - - mission_planning.publisher.route
    - remaining_distance_time_calculator.subscriber.route
  - - subscriber.odometry
    - remaining_distance_time_calculator.subscriber.odometry
  - - subscriber.vector_map
    - remaining_distance_time_calculator.subscriber.map
  - - planning_validator.publisher.trajectory
    - publisher.trajectory
  - - mission_planning.publisher.api_route
    - publisher.route
  - - mission_planning.publisher.route
    - publisher.mission_planning/route
  - - mission_planning.publisher.route_state
    - publisher.route_state
  - - scenario_planning.publisher.turn_indicators_cmd
    - publisher.turn_indicators_cmd
  - - scenario_planning.publisher.hazard_lights_cmd
    - publisher.hazard_lights_cmd
  - - scenario_planning.publisher.scenario
    - publisher.scenario
  - - mission_planning.server.clear_route
    - server.clear_route
  - - mission_planning.server.set_lanelet_route
    - server.set_lanelet_route
  - - mission_planning.server.set_waypoint_route
    - server.set_waypoint_route
