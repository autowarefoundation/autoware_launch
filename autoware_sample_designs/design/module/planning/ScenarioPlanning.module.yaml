autoware_system_design_format: 0.3.0

# module information
name: ScenarioPlanning.module

instances:
  - name: lane_driving
    entity: LaneDriving.module
  - name: parking
    entity: Parking.module
  - name: scenario_selector
    entity: ScenarioSelector.node
  - name: velocity_smoother
    entity: VelocitySmoother.node
  - name: external_velocity_limit_selector
    entity: ExternalVelocityLimitSelector.node
  - name: hazard_lights_selector
    entity: HazardLightsSelector.node

# interfaces
subscribers:
  - name: perception_objects
  - name: pointcloud
  - name: vector_map
  - name: route
  - name: odometry
  - name: acceleration
  - name: operation_mode_state
  - name: occupancy_grid_map
  - name: costmap
  - name: traffic_signals
  - name: virtual_traffic_light_states

publishers:
  - name: trajectory
  - name: hazard_lights_cmd
  - name: turn_indicators_cmd
  - name: scenario
  - name: current_max_velocity
  - name: stop_reasons

connections:
  - - subscriber.route
    - lane_driving.subscriber.route
  - - subscriber.vector_map
    - lane_driving.subscriber.vector_map
  - - subscriber.perception_objects
    - lane_driving.subscriber.perception
  - - subscriber.occupancy_grid_map
    - lane_driving.subscriber.occupancy_grid_map
  - - subscriber.costmap
    - lane_driving.subscriber.costmap
  - - subscriber.traffic_signals
    - lane_driving.subscriber.traffic_signals
  - - subscriber.virtual_traffic_light_states
    - lane_driving.subscriber.virtual_traffic_light_states
  - - subscriber.odometry
    - lane_driving.subscriber.odometry
  - - subscriber.acceleration
    - lane_driving.subscriber.accel
  - - subscriber.pointcloud
    - lane_driving.subscriber.no_ground_pointcloud
  - - scenario_selector.publisher.scenario
    - lane_driving.subscriber.scenario
  - - external_velocity_limit_selector.publisher.external_velocity_limit_mps
    - lane_driving.subscriber.external_velocity_limit_mps
  - - subscriber.perception_objects
    - parking.subscriber.objects
  - - subscriber.pointcloud
    - parking.subscriber.points_no_ground
  - - subscriber.vector_map
    - parking.subscriber.vector_map
  - - subscriber.route
    - parking.subscriber.route
  - - subscriber.odometry
    - parking.subscriber.odometry
  - - scenario_selector.publisher.scenario
    - parking.subscriber.scenario
  - - lane_driving.publisher.trajectory
    - scenario_selector.subscriber.lane_driving_trajectory
  - - parking.publisher.trajectory
    - scenario_selector.subscriber.parking_trajectory
  - - subscriber.vector_map
    - scenario_selector.subscriber.lanelet_map
  - - subscriber.route
    - scenario_selector.subscriber.route
  - - subscriber.odometry
    - scenario_selector.subscriber.odometry
  - - subscriber.operation_mode_state
    - scenario_selector.subscriber.operation_mode_state
  - - parking.publisher.is_completed
    - scenario_selector.subscriber.is_parking_completed
  - - scenario_selector.publisher.trajectory
    - velocity_smoother.subscriber.trajectory
  - - external_velocity_limit_selector.publisher.external_velocity_limit_mps
    - velocity_smoother.subscriber.external_velocity_limit_mps
  - - subscriber.acceleration
    - velocity_smoother.subscriber.acceleration
  - - subscriber.operation_mode_state
    - velocity_smoother.subscriber.operation_mode_state
  - - lane_driving.publisher.hazard_lights_cmd
    - hazard_lights_selector.subscriber.lane_driving_hazard_lights_cmd
  - - velocity_smoother.publisher.trajectory
    - publisher.trajectory
  - - velocity_smoother.publisher.current_velocity_limit_mps
    - publisher.current_max_velocity
  - - scenario_selector.publisher.scenario
    - publisher.scenario
  - - hazard_lights_selector.publisher.hazard_lights_cmd
    - publisher.hazard_lights_cmd
  - - lane_driving.publisher.turn_indicators_cmd
    - publisher.turn_indicators_cmd
  - - lane_driving.publisher.stop_reasons
    - publisher.stop_reasons
