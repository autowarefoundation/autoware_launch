autoware_system_design_format: 0.3.0

# module information
name: MotionPlanning.module

instances:
  - name: elastic_band_smoother
    entity: ElasticBandSmoother.node
  - name: path_optimizer
    entity: PathOptimizer.node
  - name: motion_velocity_planner
    entity: MotionVelocityPlanner.node
  - name: surround_obstacle_checker
    entity: SurroundObstacleChecker.node

# interfaces
subscribers:
  - name: path
  - name: vector_map
  - name: odometry
  - name: accel
  - name: dynamic_objects
  - name: no_ground_pointcloud
  - name: pointcloud
  - name: traffic_signals
  - name: occupancy_grid

publishers:
  - name: trajectory
  - name: velocity_limit
  - name: stop_reasons

connections:
  - - subscriber.path
    - elastic_band_smoother.subscriber.path
  - - subscriber.odometry
    - elastic_band_smoother.subscriber.odometry
  - - elastic_band_smoother.publisher.path
    - path_optimizer.subscriber.path
  - - subscriber.odometry
    - path_optimizer.subscriber.odometry
  - - path_optimizer.publisher.trajectory
    - motion_velocity_planner.subscriber.trajectory
  - - subscriber.vector_map
    - motion_velocity_planner.subscriber.vector_map
  - - subscriber.odometry
    - motion_velocity_planner.subscriber.vehicle_odometry
  - - subscriber.accel
    - motion_velocity_planner.subscriber.accel
  - - subscriber.dynamic_objects
    - motion_velocity_planner.subscriber.dynamic_objects
  - - subscriber.no_ground_pointcloud
    - motion_velocity_planner.subscriber.no_ground_pointcloud
  - - subscriber.traffic_signals
    - motion_velocity_planner.subscriber.traffic_signals
  - - subscriber.occupancy_grid
    - motion_velocity_planner.subscriber.occupancy_grid
  - - subscriber.odometry
    - surround_obstacle_checker.subscriber.odometry
  - - subscriber.dynamic_objects
    - surround_obstacle_checker.subscriber.objects
  - - subscriber.pointcloud
    - surround_obstacle_checker.subscriber.pointcloud
  - - motion_velocity_planner.publisher.trajectory
    - publisher.trajectory
  - - motion_velocity_planner.publisher.velocity_limit
    - publisher.velocity_limit

