autoware_system_design_format: 0.3.1

# module information
name: TrajectoryFollower.module

instances:
  - name: controller_node_exe
    entity: TrajectoryFollower.node
  - name: lane_departure_checker_node
    entity: LaneDepartureChecker.node

# interfaces
subscribers:
  - name: trajectory
  - name: odometry
  - name: steering_status
  - name: acceleration
  - name: operation_mode_state
  - name: vector_map
  - name: route
  - name: api_operation_mode_state

publishers:
  - name: control_cmd
  - name: predicted_trajectory

connections:
  # controller_node_exe
  - - subscriber.trajectory
    - controller_node_exe.subscriber.reference_trajectory
  - - subscriber.odometry
    - controller_node_exe.subscriber.current_odometry
  - - subscriber.steering_status
    - controller_node_exe.subscriber.current_steering
  - - subscriber.acceleration
    - controller_node_exe.subscriber.current_accel
  - - subscriber.operation_mode_state
    - controller_node_exe.subscriber.current_operation_mode
  - - controller_node_exe.publisher.control_cmd
    - publisher.control_cmd
  - - controller_node_exe.publisher.predicted_trajectory
    - publisher.predicted_trajectory

  # lane_departure_checker_node
  - - subscriber.trajectory
    - lane_departure_checker_node.subscriber.reference_trajectory
  - - subscriber.odometry
    - lane_departure_checker_node.subscriber.odometry
  - - subscriber.vector_map
    - lane_departure_checker_node.subscriber.lanelet_map_bin
  - - subscriber.route
    - lane_departure_checker_node.subscriber.route
  - - subscriber.api_operation_mode_state
    - lane_departure_checker_node.subscriber.api_operation_mode_state
  - - controller_node_exe.publisher.predicted_trajectory
    - lane_departure_checker_node.subscriber.predicted_trajectory
