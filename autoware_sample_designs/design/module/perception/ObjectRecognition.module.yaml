autoware_system_design_format: 0.3.0

name: ObjectRecognition.module

instances:
  - name: detection
    entity: ObjectDetection.module
  - name: tracking
    entity: ObjectTracking.module
  - name: prediction
    entity: ObjectPredictionMapBased.module

subscribers:
  # map
  - name: pointcloud_map
  - name: vector_map
  - name: service_pointcloud_map_diff
  # localization
  - name: kinematic_state
  # traffic lights
  - name: traffic_lights
  # lidar
  - name: pointcloud
  - name: obstacle_pointcloud
  - name: lidar_ml_objects
publishers:
  - name: objects

connections:
  # detection
  - - subscriber.pointcloud_map
    - detection.subscriber.pointcloud_map
  - - subscriber.vector_map
    - detection.subscriber.vector_map
  - - client.service_pointcloud_map_diff
    - detection.client.service_pointcloud_map_diff
  - - subscriber.kinematic_state
    - detection.subscriber.kinematic_state
  - - subscriber.pointcloud
    - detection.subscriber.pointcloud
  - - subscriber.obstacle_pointcloud
    - detection.subscriber.obstacle_pointcloud

  # tracking
  - - detection.publisher.lidar_ml_objects
    - tracking.subscriber.lidar_ml_objects
  - - detection.publisher.lidar_clustering_objects
    - tracking.subscriber.lidar_rule_detector_objects
  - - detection.publisher.tracker_based_detector_objects
    - tracking.subscriber.tracker_based_detector_objects
  - - tracking.publisher.objects
    - detection.subscriber.tracked_objects

  # prediction
  - - tracking.publisher.objects
    - prediction.subscriber.tracked_objects
  - - subscriber.vector_map
    - prediction.subscriber.vector_map
  - - subscriber.traffic_lights
    - prediction.subscriber.traffic_lights
  - - prediction.publisher.objects
    - publisher.objects
