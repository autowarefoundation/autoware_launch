autoware_system_design_format: 0.3.1

name: OccupancyGridMapPointcloudBased.module

instances:
  - name: occupancy_grid_map_node
    entity: PointcloudBasedOccupancyGridMap.node

subscribers:
  # lidar
  - name: obstacle_pointcloud
  - name: raw_pointcloud
publishers:
  - name: map

connections:
  - - subscriber.raw_pointcloud
    - occupancy_grid_map_node.subscriber.raw_pointcloud
  - - subscriber.obstacle_pointcloud
    - occupancy_grid_map_node.subscriber.obstacle_pointcloud
  - - occupancy_grid_map_node.publisher.occupancy_grid_map
    - publisher.map
