autoware_system_design_format: 0.3.1

name: LaserscanBasedOccupancyGridMap.module

instances:
  - name: pointcloud_to_laserscan
    entity: PointcloudToLaserscan.node
  - name: occupancy_grid_map_node
    entity: LaserscanBasedOccupancyGridMap.node

subscribers:
  - name: obstacle_pointcloud
  - name: raw_pointcloud

publishers:
  - name: map

connections:
  - - subscriber.obstacle_pointcloud
    - pointcloud_to_laserscan.subscriber.pointcloud

  - - subscriber.obstacle_pointcloud
    - occupancy_grid_map_node.subscriber.obstacle_pointcloud
  - - subscriber.raw_pointcloud
    - occupancy_grid_map_node.subscriber.raw_pointcloud
  - - pointcloud_to_laserscan.publisher.laserscan
    - occupancy_grid_map_node.subscriber.laserscan
  - - occupancy_grid_map_node.publisher.occupancy_grid_map
    - publisher.map
