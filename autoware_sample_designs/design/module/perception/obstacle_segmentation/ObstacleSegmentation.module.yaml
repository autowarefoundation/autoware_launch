autoware_system_design_format: 0.3.1

name: ObstacleSegmentation.module

instances:
  - name: crop_box_filter
    entity: CropBoxFilter.node
  - name: common_ground_filter
    entity: ScanGroundFilter.node

subscribers:
  # lidar
  - name: concatenated_pointcloud
publishers:
  - name: pointcloud

connections:
  - - subscriber.concatenated_pointcloud
    - crop_box_filter.subscriber.input
  - - crop_box_filter.publisher.output
    - common_ground_filter.subscriber.pointcloud
  - - common_ground_filter.publisher.pointcloud
    - publisher.pointcloud
