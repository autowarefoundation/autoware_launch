autoware_system_design_format: 0.3.1

name: Perception.module

instances:
  - name: obstacle_segmentation
    entity: ObstacleSegmentation.module
  - name: object_recognition
    entity: ObjectRecognition.module
  - name: occupancy_grid_map
    entity: OccupancyGridMapPointcloudBased.module

subscribers:
  # lidar
  - name: concatenated_pointcloud
  # map
  - name: vector_map
  - name: pointcloud_map
  - name: service_pointcloud_map_diff
  # localization
  - name: kinematic_state

publishers:
  - name: objects
  - name: obstacle_pointcloud
  - name: map

connections:
  # obstacle segmentation
  - - subscriber.concatenated_pointcloud
    - obstacle_segmentation.subscriber.concatenated_pointcloud

  # object recognition
  - - subscriber.concatenated_pointcloud
    - object_recognition.subscriber.pointcloud
  - - obstacle_segmentation.publisher.pointcloud
    - object_recognition.subscriber.obstacle_pointcloud
  - - subscriber.vector_map
    - object_recognition.subscriber.vector_map
  - - subscriber.pointcloud_map
    - object_recognition.subscriber.pointcloud_map
  - - client.service_pointcloud_map_diff
    - object_recognition.client.service_pointcloud_map_diff
  - - subscriber.kinematic_state
    - object_recognition.subscriber.kinematic_state

  # occupancy grid map
  - - subscriber.concatenated_pointcloud
    - occupancy_grid_map.subscriber.raw_pointcloud
  - - obstacle_segmentation.publisher.pointcloud
    - occupancy_grid_map.subscriber.obstacle_pointcloud

  # outputs
  - - obstacle_segmentation.publisher.pointcloud
    - publisher.obstacle_pointcloud
  - - object_recognition.publisher.objects
    - publisher.objects
  - - occupancy_grid_map.publisher.map
    - publisher.map
