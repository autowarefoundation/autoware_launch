autoware_system_design_format: 0.3.1

name: AutowareSample.system

variables:
  # common variables
  - name: config_path
    value: $(find-pkg-share autoware_sample_designs)/config
  - name: vehicle_model
    value: sample_vehicle
  - name: data_path
    value: $(env HOME)/autoware_data/ml_models
  - name: lanelet2_map_file
    value: lanelet2_map.osm
  - name: pointcloud_map_file
    value: pointcloud_map.pcd
  # vehicle-specific variables
  - name: config_dir
    value: $(find-pkg-share sample_sensor_kit_description)/config
  # environment variables
  - name: map_path
    value: $(env HOME)/autoware_data/maps/sample-map-rosbag

variable_files:
  - name: vehicle_info
    value: $(find-pkg-share sample_vehicle_description)/config/vehicle_info.param.yaml

modes:
  - name: Runtime
    description: on-vehicle runtime mode
    default: true
  - name: LoggingSimulation
    description: Logged data replay simulation mode
  - name: PlanningSimulation
    description: Planning simulation mode
  - name: E2ESimulation
    description: E2E simulation mode using AWSIM

parameter_sets:
  # - runtime.parameter_set
  []

components:
  # Middleware
  - name: global_parameter_loader
    entity: GlobalParameterLoader.node
    path: /ros2_system/global_parameter_loader
    compute_unit: main_ecu
    parameter_set: sample_system_global_parameter_loader.parameter_set
  - name: robot_state_publisher
    entity: SampleSystemRobotStatePublisher.node
    path: /ros2_system/robot_state_publisher
    compute_unit: main_ecu

  # ADAPI
  - name: adapi
    entity: SampleSensorKitADAPIWrapper.node
    path: /api
    compute_unit: main_ecu

  # SENSING
  - name: sensing
    entity: SampleSensorKit.module
    compute_unit: main_ecu
    parameter_set: sample_system_sensing.parameter_set

  # MAP/LOCALIZATION
  - name: map
    entity: Tier4MapWrapper.node
    compute_unit: main_ecu
  - name: localization
    entity: Tier4LocalizationWrapper.node
    compute_unit: main_ecu

  # PERCEPTION
  - name: perception
    entity: Perception.module
    compute_unit: main_ecu
    parameter_set: sample_system_perception.parameter_set

  # PLANNING/CONTROL
  - name: planning
    entity: Tier4PlanningWrapper.node
    compute_unit: main_ecu
  - name: control
    entity: Tier4ControlWrapper.node
    compute_unit: main_ecu

  # SYSTEM
  - name: system
    entity: Tier4SystemWrapper.node
    compute_unit: main_ecu

node_groups:
  - name: pointcloud_container
    type: ros2_component_container_mt_ipc
    nodes:
      - /sensing/lidar/concatenate_and_time_sync
      - /perception/obstacle_segmentation/*
      - /perception/object_recognition/detection/pointcloud_map_filter/voxel_grid_downsample_filter
      - /perception/object_recognition/detection/clustering/euclidean_cluster
      - /perception/occupancy_grid_map/occupancy_grid_map_node
  - name: lidar_top_container
    type: ros2_component_container_mt_ipc
    nodes:
      - /sensing/lidar/top/*
  - name: lidar_left_container
    type: ros2_component_container_ipc
    nodes:
      - /sensing/lidar/left/*
  - name: lidar_right_container
    type: ros2_component_container_ipc
    nodes:
      - /sensing/lidar/right/*
  - name: traffic_light_node_container
    type: ros2_component_container_mt_ipc
    nodes:
      - /perception/traffic_light_recognition/camera1/detection
      - /perception/traffic_light_recognition/camera1/classifier_pedestrian
      - /perception/traffic_light_recognition/camera1/classifier_car

connections:
  - - localization.publisher.kinematic_state
    - sensing.subscriber.odometry
  - - localization.publisher.pose_estimator/pose_with_covariance
    - sensing.subscriber.pose_ndt

  - - localization.publisher.initialization_state
    - adapi.subscriber.localization/initialization_state
  - - localization.publisher.kinematic_state
    - adapi.subscriber.localization/kinematic_state

  - - sensing.publisher.lidar/concatenated/pointcloud
    - perception.subscriber.concatenated_pointcloud
  - - map.publisher.vector_map
    - perception.subscriber.vector_map
  - - map.publisher.pointcloud_map
    - perception.subscriber.pointcloud_map
  - - map.server.get_differential_pointcloud_map
    - perception.client.service_pointcloud_map_diff
  - - localization.publisher.kinematic_state
    - perception.subscriber.kinematic_state

  - - map.publisher.vector_map
    - localization.subscriber.lanelet_map
  - - map.publisher.pointcloud_map
    - localization.subscriber.pointcloud_map
  - - sensing.publisher.lidar/concatenated/pointcloud
    - localization.subscriber.pointcloud
  - - sensing.publisher.imu/imu_data
    - localization.subscriber.imu
  - - sensing.publisher.vehicle_velocity_converter/twist_with_covariance
    - localization.subscriber.twist
  - - sensing.publisher.gnss/pose_with_covariance
    - localization.subscriber.gnss_pose_with_covariance
  - - adapi.publisher.localization/initialization_state
    - localization.subscriber.initialization_state

  - - planning.publisher.mission_planning/route
    - perception.subscriber.route

  - - perception.publisher.occupancy_grid_map/map
    - planning.subscriber.occupancy_grid_map
  - - map.publisher.vector_map
    - planning.subscriber.lanelet_map
  - - perception.publisher.object_recognition/objects
    - planning.subscriber.objects
  - - perception.publisher.obstacle_segmentation/pointcloud
    - planning.subscriber.obstacle_pointcloud
  - - perception.publisher.traffic_light_recognition/traffic_signals
    - planning.subscriber.traffic_signals

  - - planning.publisher.^
    - control.subscriber.^
  - - localization.publisher.kinematic_state
    - control.subscriber.kinematics
  - - localization.publisher.acceleration
    - control.subscriber.acceleration
  - - perception.publisher.object_recognition/objects
    - control.subscriber.objects
  - - perception.publisher.obstacle_segmentation/pointcloud
    - control.subscriber.obstacle_pointcloud
  - - sensing.publisher.imu/imu_data
    - control.subscriber.imu

  - - system.publisher.system/fail_safe/mrm_state
    - adapi.subscriber.system/fail_safe/mrm_state

# mode configurations
LoggingSimulation:
  override:
    parameter_sets:
      - logging_simulation.parameter_set
    components:
      - name: sensing
        entity: SampleSensorKit_sim.module
        compute_unit: main_ecu
        parameter_set: sample_system_sensing.parameter_set
      - name: rosbag_replay
        entity: SampleRosbagReplay.node
        path: /
        compute_unit: dummy_ecu
    connections:
      - - rosbag_replay.publisher.sensing/^
        - sensing.subscriber.^

E2ESimulation:
  override:
    variables:
      - name: map_path
        value: $(env HOME)/autoware_data/maps/nishishinjuku_autoware_map
    parameter_sets:
      - e2e_simulation.parameter_set
    components:
      - name: AWSIM_in
        entity: SampleAwsimIn.node
        path: /
        compute_unit: dummy_ecu
      - name: AWSIM_out
        entity: SampleAwsimOut.node
        path: /
        compute_unit: dummy_ecu
      - name: sensing
        entity: SampleSensorKitAWSIM.module
        compute_unit: main_ecu
        parameter_set: sample_system_sensing.parameter_set
    connections:
      # SENSING
      - - AWSIM_out.publisher.sensing/lidar/top/pointcloud_raw_ex
        - sensing.subscriber.lidar/top/pointcloud_raw_ex
      - - AWSIM_out.publisher.sensing/imu/tamagawa/imu_raw
        - sensing.subscriber.imu/tamagawa/imu_raw
      - - AWSIM_out.publisher.vehicle/status/velocity_status
        - sensing.subscriber.velocity_status
      # Traffic light
      - - AWSIM_out.publisher.sensing/camera/traffic_light/image_raw
        - perception.subscriber.traffic_camera/image
      - - AWSIM_out.publisher.sensing/camera/traffic_light/camera_info
        - perception.subscriber.traffic_camera/camera_info
      # localization
      - - AWSIM_out.publisher.sensing/gnss/pose_with_covariance
        - localization.subscriber.gnss_pose_with_covariance
      # control
      - - AWSIM_out.publisher.vehicle/status/velocity_status
        - control.subscriber.velocity_status
      - - control.publisher.command/control_cmd
        - AWSIM_in.subscriber.control/command/control_cmd
      - - control.publisher.command/gear_cmd
        - AWSIM_in.subscriber.control/command/gear_cmd
      - - control.publisher.command/hazard_lights_cmd
        - AWSIM_in.subscriber.control/command/hazard_lights_cmd
      - - control.publisher.command/turn_indicators_cmd
        - AWSIM_in.subscriber.control/command/turn_indicators_cmd
  remove:
    connections:
      - - sensing.publisher.gnss
        - localization.subscriber.gnss_pose_with_covariance
      - - sensing.publisher.gnss/pose_with_covariance
        - localization.subscriber.gnss_pose_with_covariance

PlanningSimulation:
  remove:
    components:
      - name: sensing
      - name: perception
      - name: localization
    node_groups:
      - name: pointcloud_container
  override:
    parameter_sets:
      - planning_simulation.parameter_set
    components:
      - name: occupancy_grid_map
        entity: LaserscanBasedOccupancyGridMap.module
        path: /perception/occupancy_grid_map
        compute_unit: main_ecu
      - name: planning_sim_rviz_plugin
        entity: PlanningSimRvizPlugins.module
        path: /
        compute_unit: dummy_ecu
      - name: perception
        entity: DummyObjectRecognition.module
        path: /perception
        compute_unit: main_ecu
      - name: localization
        entity: PlanningSimApiLocalization.module
        path: /
        compute_unit: main_ecu
      - name: simulator
        entity: SimplePlanningSimulator.node
        path: /
        compute_unit: main_ecu
      - name: vehicle
        entity: PlanningSimVehicle.module
        compute_unit: main_ecu
    connections:
      - - planning_sim_rviz_plugin.publisher.simulation/dummy_perception_publisher/object_info
        - perception.subscriber.dummy_object_info
      - - perception.publisher.object_recognition/objects
        - planning.subscriber.objects
      - - perception.publisher.object_recognition/objects
        - control.subscriber.objects
      - - perception.publisher.obstacle_segmentation/pointcloud
        - occupancy_grid_map.subscriber.obstacle_pointcloud
      - - perception.publisher.obstacle_segmentation/pointcloud
        - planning.subscriber.obstacle_pointcloud
      - - perception.publisher.obstacle_segmentation/pointcloud
        - control.subscriber.obstacle_pointcloud
      - - map.publisher.vector_map
        - perception.subscriber.vector_map
      - - localization.publisher.localization/initialization_state
        - adapi.subscriber.localization/initialization_state
      # SIMULATOR
      - - map.publisher.vector_map
        - simulator.subscriber.map/vector_map
      - - localization.publisher.initialpose3d
        - simulator.subscriber.initialpose3d
      - - planning.publisher.trajectory
        - simulator.subscriber.planning/trajectory
      - - control.publisher.command/control_cmd
        - simulator.subscriber.control/command/control_cmd
      - - control.publisher.command/control_cmd
        - vehicle.subscriber.control_cmd
      - - simulator.publisher.localization/kinematic_state
        - vehicle.subscriber.odometry
      - - simulator.publisher.localization/acceleration
        - vehicle.subscriber.accel
      - - simulator.publisher.vehicle/status/steering_status
        - vehicle.subscriber.steering
      - - simulator.publisher.vehicle/status/actuation_status
        - vehicle.subscriber.actuation_status
      - - system.publisher.system/operation_mode/state
        - vehicle.subscriber.operation_mode_state
      - - vehicle.publisher.actuation_cmd
        - simulator.subscriber.control/command/actuation_cmd
      - - control.publisher.command/gear_cmd
        - simulator.subscriber.control/command/gear_cmd
      - - control.publisher.command/turn_indicators_cmd
        - simulator.subscriber.control/command/turn_indicators_cmd
      - - control.publisher.command/hazard_lights_cmd
        - simulator.subscriber.control/command/hazard_lights_cmd
      - - simulator.publisher.^
        - adapi.subscriber.^
      - - vehicle.publisher.doors/status
        - adapi.subscriber.vehicle/doors/status
      - - simulator.publisher.vehicle/status/velocity_status
        - control.subscriber.velocity_status
      - - simulator.publisher.localization/kinematic_state
        - control.subscriber.kinematics

      # - - simulator.publisher.localization/acceleration
      #   - control.subscriber.acceleration
      - - control.subscriber.acceleration
        - simulator.publisher.localization/acceleration
