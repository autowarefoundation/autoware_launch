autoware_system_design_format: 0.3.0

name: PointpaintingFusion.module

instances:
  - name: pointpainting_fusion
    entity: PointPaintingFusion.node
  - name: validation
    entity: ObstaclePointCloudBasedValidator.node

subscribers:
  - name: rois0
  - name: rois1
  - name: rois2
  - name: rois3
  - name: rois4
  - name: rois5
  - name: rois6
  - name: rois7
  - name: camera_info0
  - name: camera_info1
  - name: camera_info2
  - name: camera_info3
  - name: camera_info4
  - name: camera_info5
  - name: camera_info6
  - name: camera_info7
  - name: pointcloud
  - name: obstacle_pointcloud
publishers:
  - name: detected_objects

connections:
  - - subscriber.pointcloud
    - pointpainting_fusion.subscriber.pointcloud
  - - subscriber.rois*
    - pointpainting_fusion.subscriber.rois*
  - - subscriber.camera_info*
    - pointpainting_fusion.subscriber.camera_info*
  - - pointpainting_fusion.publisher.objects
    - validation.subscriber.detected_objects
  - - subscriber.obstacle_pointcloud
    - validation.subscriber.obstacle_pointcloud
  - - validation.publisher.objects
    - publisher.detected_objects
