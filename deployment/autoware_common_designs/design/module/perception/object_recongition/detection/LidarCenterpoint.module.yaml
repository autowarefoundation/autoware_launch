autoware_system_design_format: 0.3.0

name: LidarCenterpoint.module

instances:
  - name: lidar_centerpoint
    entity: LidarCenterpoint.node
  - name: validation
    entity: ObstaclePointCloudBasedValidator.node

inputs:
  - name: pointcloud
  - name: obstacle_pointcloud
outputs:
  - name: detected_objects

connections:
  - [subscriber.pointcloud, lidar_centerpoint.subscriber.pointcloud]
  - [lidar_centerpoint.publisher.objects, validation.subscriber.detected_objects]
  - [subscriber.obstacle_pointcloud, validation.subscriber.obstacle_pointcloud]
  - [validation.publisher.objects, publisher.detected_objects]
