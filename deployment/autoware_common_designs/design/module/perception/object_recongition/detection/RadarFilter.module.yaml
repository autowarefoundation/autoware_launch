autoware_system_design_format: 0.3.0

name: RadarFilter.module

instances:
  # filter
  - name: object_lanelet_filter
    entity: ObjectLaneletFilter.node
  - name: radar_object_filter
    entity: DetectedObjectSorter.node

inputs:
  - name: vector_map
  - name: radar_objects
outputs:
  - name: radar_filtered_objects

connections:
  - [subscriber.radar_objects, radar_object_filter.subscriber.objects]
  - [radar_object_filter.publisher.objects, object_lanelet_filter.subscriber.object]
  - [subscriber.vector_map, object_lanelet_filter.subscriber.vector_map]
  - [object_lanelet_filter.publisher.object, publisher.radar_filtered_objects]
