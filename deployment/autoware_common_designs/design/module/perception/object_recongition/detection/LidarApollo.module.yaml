autoware_system_design_format: 0.3.0

name: LidarApollo.module

instances:
  - name: lidar_apollo_instance_segmentation
    entity: LidarApolloInstanceSegmentation.node
  - name: shape_estimation
    entity: ShapeEstimation.node
  - name: detected_object_feature_remover
    entity: DetectedObjectFeatureRemover.node
  - name: validation
    entity: ObstaclePointCloudBasedValidator.node

inputs:
  - name: pointcloud
  - name: obstacle_pointcloud
outputs:
  - name: detected_objects

connections:
  - [subscriber.pointcloud, lidar_apollo_instance_segmentation.subscriber.pointcloud]
  - [
      lidar_apollo_instance_segmentation.publisher.labeled_clusters,
      shape_estimation.subscriber.objects,
    ]
  - [shape_estimation.publisher.objects, detected_object_feature_remover.subscriber.input]
  - [detected_object_feature_remover.publisher.output, validation.subscriber.detected_objects]
  - [subscriber.obstacle_pointcloud, validation.subscriber.obstacle_pointcloud]
  - [validation.publisher.objects, publisher.detected_objects]
