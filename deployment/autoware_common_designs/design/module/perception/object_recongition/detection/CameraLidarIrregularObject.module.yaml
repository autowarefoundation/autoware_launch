autoware_system_design_format: 0.3.1

name: CameraLidarIrregularObject.module

instances:
  - name: crop_box_filter
    entity: CropBoxFilter.node
    arguments:
      use_container: true
  - name: ground_filter
    entity: ScanGroundFilter.node
  - name: roi_pointcloud_fusion
    entity: RoiPointCloudFusion.node
    arguments:
      use_container: true
  - name: shape_estimation
    entity: ShapeEstimation.node
  - name: detected_object_feature_remover
    entity: DetectedObjectFeatureRemover.node

subscribers:
  - name: pointcloud
  - name: rois0
  - name: rois1
  - name: rois2
  - name: rois3
  - name: camera_info0
  - name: camera_info1
  - name: camera_info2
  - name: camera_info3
publishers:
  - name: objects

connections:
  - - subscriber.pointcloud
    - crop_box_filter.subscriber.input
  - - crop_box_filter.publisher.output
    - ground_filter.subscriber.pointcloud
  - - ground_filter.publisher.pointcloud
    - roi_pointcloud_fusion.subscriber.pointcloud

  - - subscriber.rois*
    - roi_pointcloud_fusion.subscriber.rois*
  - - subscriber.camera_info*
    - roi_pointcloud_fusion.subscriber.camera_info*

  - - roi_pointcloud_fusion.publisher.clusters
    - shape_estimation.subscriber.objects
  - - shape_estimation.publisher.objects
    - detected_object_feature_remover.subscriber.input
  - - detected_object_feature_remover.publisher.output
    - publisher.objects
