autoware_system_design_format: 0.3.0

name: ObjectTrackingMultiChannel.module

instances:
  - name: multi_object_tracker
    entity: MultiObjectTracker.node

inputs:
  - name: lidar_ml_objects
  - name: lidar_ml_short_range_objects
  - name: camera_lidar_rule_detector_objects
  - name: camera_lidar_irregular_objects
  - name: tracker_based_detector_objects
  - name: radar_objects
outputs:
  - name: objects

connections:
  - [subscriber.lidar_ml_objects, multi_object_tracker.subscriber.detection01/objects]
  - [subscriber.lidar_ml_short_range_objects, multi_object_tracker.subscriber.detection02/objects]
  - [
      subscriber.camera_lidar_rule_detector_objects,
      multi_object_tracker.subscriber.detection03/objects,
    ]
  - [subscriber.camera_lidar_irregular_objects, multi_object_tracker.subscriber.detection04/objects]
  - [subscriber.tracker_based_detector_objects, multi_object_tracker.subscriber.detection05/objects]
  - [subscriber.radar_objects, multi_object_tracker.subscriber.detection06/objects]
  - [multi_object_tracker.publisher.objects, publisher.objects]
