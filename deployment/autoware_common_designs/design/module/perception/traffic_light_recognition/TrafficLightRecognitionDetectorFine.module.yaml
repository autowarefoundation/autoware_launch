autoware_system_design_format: 0.3.0

name: TrafficLightRecognitionDetectorFine.module

instances:
  - name: map_based_detector
    entity: TrafficLightMapBasedDetector.node
  - name: detection
    entity: TrafficLightFineDetector.node
  - name: classifier_car
    entity: TrafficLightClassifierCar.node
  - name: classifier_pedestrian
    entity: TrafficLightClassifierPedestrian.node
  - name: occlusion_predictor
    entity: TrafficLightOcclusionPredictor.node

subscribers:
  - name: vector_map
  - name: image
  - name: camera_info
  - name: route
  - name: pointcloud
publishers:
  - name: classification/traffic_signals
  - name: detection/rois

connections:
  - [subscriber.vector_map, map_based_detector.subscriber.vector_map]
  - [subscriber.route, map_based_detector.subscriber.route]
  - [subscriber.camera_info, map_based_detector.subscriber.camera_info]

  - [subscriber.image, detection.subscriber.image]
  - [map_based_detector.publisher.rough_rois, detection.subscriber.rough_rois]
  - [map_based_detector.publisher.expected_rois, detection.subscriber.expect_rois]
  - [detection.publisher.rois, publisher.detection/rois]

  - [subscriber.image, classifier_car.subscriber.image]
  - [detection.publisher.rois, classifier_car.subscriber.rois]

  - [subscriber.image, classifier_pedestrian.subscriber.image]
  - [detection.publisher.rois, classifier_pedestrian.subscriber.rois]

  - [subscriber.pointcloud, occlusion_predictor.subscriber.cloud]
  - [subscriber.vector_map, occlusion_predictor.subscriber.vector_map]
  - [subscriber.camera_info, occlusion_predictor.subscriber.camera_info]
  - [detection.publisher.rois, occlusion_predictor.subscriber.rois]
  - [classifier_car.publisher.traffic_signals, occlusion_predictor.subscriber.car/traffic_signals]
  - [
      classifier_pedestrian.publisher.traffic_signals,
      occlusion_predictor.subscriber.pedestrian/traffic_signals,
    ]
  - [occlusion_predictor.publisher.traffic_signals, publisher.classification/traffic_signals]
