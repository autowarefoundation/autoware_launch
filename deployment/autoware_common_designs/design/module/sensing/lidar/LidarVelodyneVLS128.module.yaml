autoware_system_design_format: 0.3.0

name: LidarVelodyneVLS128.module

instances:
  - name: lidar
    entity: NebulaVelodyneVLS128.node
  - name: crop_box_filter_self
    entity: CropBoxFilter.node
  - name: crop_box_filter_wheels
    entity: CropBoxFilter.node
  - name: distortion_corrector_node
    entity: DistortionCorrector.node

subscribers:
  - name: twist
  - name: imu
publishers:
  - name: pointcloud

connections:
  - [lidar.publisher.velodyne_points, crop_box_filter_self.subscriber.input]
  - [crop_box_filter_self.publisher.output, crop_box_filter_wheels.subscriber.input]
  - [crop_box_filter_wheels.publisher.output, distortion_corrector_node.subscriber.pointcloud]
  - [subscriber.twist, distortion_corrector_node.subscriber.twist]
  - [subscriber.imu, distortion_corrector_node.subscriber.imu]
  - [distortion_corrector_node.publisher.pointcloud, publisher.pointcloud]
