autoware_system_design_format: 0.3.0

name: TrafficLightRecognition.module

instances:
  - name: camera1
    entity: TrafficLightRecognitionDetectorFine.module

  - name: multi_camera_fusion
    entity: TrafficLightMultiCameraFusion_1_input.node
  - name: traffic_light_arbiter
    entity: TrafficLightArbiter.node
  - name: traffic_light_crosswalk_estimator
    entity: CrosswalkTrafficLightEstimator.node

inputs:
  - name: vector_map
  - name: route
  - name: camera1/image
  - name: camera1/camera_info
  - name: pointcloud
  - name: external_traffic_signals
outputs:
  - name: traffic_signals

connections:
  - [subscriber.route, camera*.subscriber.route]
  - [subscriber.vector_map, camera*.subscriber.vector_map]
  - [subscriber.camera*/image, camera*.subscriber.image]
  - [subscriber.camera*/camera_info, camera*.subscriber.camera_info]
  - [subscriber.pointcloud, camera*.subscriber.pointcloud]

  - [subscriber.vector_map, multi_camera_fusion.subscriber.vector_map]
  - [subscriber.camera*/camera_info, multi_camera_fusion.subscriber.camera*/camera_info]
  - [
      camera*.publisher.classification/traffic_signals,
      multi_camera_fusion.subscriber.camera*/classification/traffic_signals,
    ]
  - [camera*.publisher.detection/rois, multi_camera_fusion.subscriber.camera*/detection/rois]

  - [subscriber.vector_map, traffic_light_arbiter.subscriber.vector_map]
  - [
      multi_camera_fusion.publisher.traffic_signals,
      traffic_light_arbiter.subscriber.perception_traffic_signals,
    ]
  - [subscriber.external_traffic_signals, traffic_light_arbiter.subscriber.external_traffic_signals]

  - [subscriber.vector_map, traffic_light_crosswalk_estimator.subscriber.vector_map]
  - [subscriber.route, traffic_light_crosswalk_estimator.subscriber.route]
  - [
      traffic_light_arbiter.publisher.traffic_signals,
      traffic_light_crosswalk_estimator.subscriber.traffic_signals,
    ]
  - [traffic_light_crosswalk_estimator.publisher.traffic_signals, publisher.traffic_signals]
