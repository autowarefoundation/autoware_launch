# This file is managed by sync-params workflow.
# Keys marked with '{OVERRIDE}' or '# {OVERRIDE: reason}' are persisted as variant overrides.
# 'reason' can be any single-line text without braces.
# To keep local changes, annotate fields with '# {OVERRIDE}' or '# {OVERRIDE: reason}'.
#
# Source: https://github.com/autowarefoundation/autoware_universe/blob/98ef5348b6e9e22f9ca69c9f841655bd7fc44610/localization/yabloc/yabloc_particle_filter/config/camera_particle_corrector.param.yaml

/**:
  ros__parameters:
    # Declared in AbstractParticleCorrector
    acceptable_max_delay: 1.0
    visualize: false

    # Declared in ll2_cost_map
    image_size: 800 # cost map image made by lanelet2
    max_range: 40.0 # [m] a cost map scale size
    gamma: 5.0 # cost map intensity gradient

    min_prob: 0.1 # minimum weight of particles
    far_weight_gain: 0.001 # exp(-far_weight_gain_ * squared_norm) is multiplied each measurement
    enabled_at_first: true # developing feature
