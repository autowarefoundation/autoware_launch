# This file is managed by sync-params workflow.
# DO NOT EDIT THIS FILE DIRECTLY FOR ADDING OR REMOVING FIELDS. Follow these steps:
#
# 1. Modify the param file in the upstream repository.
# 2. Run the sync-params workflow or run `python .github/scripts/sync_params.py localization` to update this file.
# 3. If local changes are needed, annotate them with an override marker (see below).
#
# Keys marked with '{OVERRIDE}' or '# {OVERRIDE: reason}' are persisted as variant overrides.
# 'reason' can be any single-line text without braces.
# To keep local changes, annotate fields with '# {OVERRIDE}' or '# {OVERRIDE: reason}'.
#
# Source: https://github.com/autowarefoundation/autoware_core/blob/cdac1c800568542ecf3d111c893ffeea5da513c0/localization/autoware_ekf_localizer/config/ekf_localizer.param.yaml

/**:
  ros__parameters:
    node:
      show_debug_info: false
      enable_yaw_bias_estimation: true
      predict_frequency: 50.0
      tf_rate: 50.0
      extend_state_step: 50

    pose_measurement:
      # for Pose measurement
      pose_additional_delay: 0.0
      pose_measure_uncertainty_time: 0.01
      pose_smoothing_steps: 5
      max_pose_queue_size: 5 # if multiple measurements arrive within one ekf_dt, this limits must be adjusted.
      pose_gate_dist: 49.5 # corresponds to significance level = 10^-10

    twist_measurement:
      # for twist measurement
      twist_additional_delay: 0.0
      twist_smoothing_steps: 2
      max_twist_queue_size: 2 # if multiple measurements arrive within one ekf_dt, this limits must be adjusted.
      twist_gate_dist: 46.1 # corresponds to significance level = 10^-10

    process_noise:
      # for process model
      proc_stddev_yaw_c: 0.005
      proc_stddev_vx_c: 10.0
      proc_stddev_wz_c: 5.0

    simple_1d_filter_parameters:
      #Simple1DFilter parameters
      z_filter_proc_dev: 5.0
      roll_filter_proc_dev: 0.1
      pitch_filter_proc_dev: 0.1

    diagnostics:
      # for diagnostics
      pose_no_update_count_threshold_warn: 50
      pose_no_update_count_threshold_error: 100
      twist_no_update_count_threshold_warn: 50
      twist_no_update_count_threshold_error: 100
      ellipse_scale: 3.0
      error_ellipse_size: 1.5
      warn_ellipse_size: 1.2
      error_ellipse_size_lateral_direction: 0.3
      warn_ellipse_size_lateral_direction: 0.25
      # diagnostics publish frequency [Hz] (must be > 0)
      diagnostics_publish_frequency: 10.0

    misc:
      # for velocity measurement limitation (Set 0.0 if you want to ignore)
      threshold_observable_velocity_mps: 0.0 # [m/s]
      pose_frame_id: "map"
