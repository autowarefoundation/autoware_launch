# Source: https://github.com/autowarefoundation/autoware_universe/blob/a333d0e4529af5a6ec509b97140eda96b24295ba/planning/autoware_diffusion_planner/config/diffusion_planner.param.yaml

/**:
  ros__parameters:
    plugins_path: $(find-pkg-share autoware_tensorrt_plugins)/plugins/libautoware_tensorrt_plugins.so
    model:
      type: "multi_step"
      backend: "tensorrt" # "tensorrt" "ort_cpu" "ort_cuda" "ort_tensorrt"
      precision: "fp32"
      use_cuda_graph: false
      args_path: $(var data_path)/diffusion_planner/v5.0/diffusion_planner.param.json
      single_step_model:
        onnx_model_path: $(var data_path)/diffusion_planner/v5.0/diffusion_planner.onnx
      multi_step_model:
        encoder_onnx_model_path: $(var data_path)/diffusion_planner/v5.0/diffusion_planner_encoder.onnx
        decoder_onnx_model_path: $(var data_path)/diffusion_planner/v5.0/diffusion_planner_decoder.onnx
        turn_indicator_onnx_model_path: $(var data_path)/diffusion_planner/v5.0/diffusion_planner_turn_indicator.onnx
        dpm_solver_steps: 10
    guidance:
      start_guidance:
        reference_distance_m: 10.0
        max_scale: 30.0
      stop_guidance:
        stop_acceleration_mps2: 1.0
      centerline_guidance:
        start_time_s: 2.0
    planning_frequency_hz: 10.0
    ignore_neighbors: false
    ignore_unknown_neighbors: true
    traffic_light_group_msg_timeout_seconds: 0.2
    batch_size: 1
    temperature: [0.0]
    velocity_smoothing_window: 8
    stopping_threshold: 0.3
    turn_indicator_keep_offset: -1.25
    turn_indicator_hold_duration: 1.0
    shift_x: false
    delay_step: 0
    line_string_max_step_m: 5.0
    use_time_interpolation: false
    neighbor_vehicle_extended_width_margin_m: 0.0
    planning_factor:
      enable_stop: true
      enable_slowdown: false
      stop_keep_duration_threshold: 1.0  # [s]
      stop_velocity_threshold: 0.1       # [m/s]
      slowdown_accel_threshold: -0.3     # [m/s^2]
    debug_params:
      publish_debug_route: true
      publish_debug_map: false
      publish_debug_linestrings: true
