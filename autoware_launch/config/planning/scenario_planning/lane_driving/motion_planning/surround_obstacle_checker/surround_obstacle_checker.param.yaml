# Source: https://github.com/autowarefoundation/autoware_universe/blob/5540be5f3c5ac1584051a599ecd92ac9a8bb9701/planning/autoware_surround_obstacle_checker/config/surround_obstacle_checker.param.yaml

/**:
  ros__parameters:
    # obstacle check
    # surround_check_*_distance: if objects exist in this distance, transit to "exist-surrounding-obstacle" status [m]
    # surround_check_hysteresis_distance: if no object exists in this hysteresis distance added to the above distance, transit to "non-surrounding-obstacle" status [m]
    pointcloud:
      enable_check: false
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.5
      surround_check_back_distance: 0.5
    unknown:
      enable_check: false
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.5
      surround_check_back_distance: 0.5
    car:
      enable_check: true
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.0
      surround_check_back_distance: 0.0
    truck:
      enable_check: true
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.0
      surround_check_back_distance: 0.0
    bus:
      enable_check: true
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.0
      surround_check_back_distance: 0.0
    trailer:
      enable_check: true
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.0
      surround_check_back_distance: 0.0
    motorcycle:
      enable_check: true
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.0
      surround_check_back_distance: 0.5
    bicycle:
      enable_check: true
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.5
      surround_check_back_distance: 0.5
    pedestrian:
      enable_check: true
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.5
      surround_check_back_distance: 0.5
    animal:
      enable_check: true
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.5
      surround_check_back_distance: 0.5
    hazard:
      enable_check: true
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.5
      surround_check_back_distance: 0.5
    over_drivable:
      enable_check: false
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.5
      surround_check_back_distance: 0.5
    under_drivable:
      enable_check: false
      surround_check_front_distance: 0.5
      surround_check_side_distance: 0.5
      surround_check_back_distance: 0.5

    surround_check_hysteresis_distance: 0.1

    state_clear_time: 0.2

    # ego stop state
    stop_state_ego_speed: 0.1 #[m/s]

    # debug
    publish_debug_footprints: true # publish vehicle footprint & footprints with surround_check_distance and surround_check_recover_distance offsets
    debug_footprint_label: "car"
