# This file is managed by sync-params workflow.
# Keys marked with '{OVERRIDE}' or '# {OVERRIDE: reason}' are persisted as variant overrides.
# 'reason' can be any single-line text without braces.
# To keep local changes, annotate fields with '# {OVERRIDE}' or '# {OVERRIDE: reason}'.
#
# Source: https://github.com/autowarefoundation/autoware_universe/blob/20976b6bdb2951fb9b95244093fd8c9a14c51a27/planning/planning_validator/autoware_planning_validator_intersection_collision_checker/config/intersection_collision_checker.param.yaml

/**:
  ros__parameters:
    icc_parameters:
      enable: true
      detection_range: 100.0 # {OVERRIDE} [m]
      ttc_threshold: 2.0 # {OVERRIDE} [s]
      ego_deceleration: 1.0 # [m/s^2]
      min_time_horizon: 7.0 # {OVERRIDE} [s]
      on_time_buffer: 0.5 # [s]
      off_time_buffer: 1.0 # [s]
      close_distance_th: 3.0 # [m]
      close_time_th: 3.0 # [s]

      right_turn:
        enable: true
        check_traffic_signal: true
        check_crossing_lanes: false # {OVERRIDE}
        check_turning_lanes: false # {OVERRIDE}
        crossing_lane_angle_th: 0.785398 # [rad] (45 deg)

      left_turn:
        enable: true
        check_traffic_signal: true
        check_turning_lanes: false # {OVERRIDE}

      pointcloud:
        height_buffer: 0.5  # [m]
        min_height: 0.5  # [m]
        voxel_grid_filter:
          x: 0.2
          y: 0.2
          z: 0.2
          min_size: 3
        clustering:
          tolerance: 0.5  #[m]
          min_height: 0.5
          min_size: 10
          max_size: 10000
        velocity_estimation:
          max_acceleration: 20.0  # [m/s^2]
          max_velocity: 25.0  # [m/s]
          observation_time: 0.3  # [s]
          max_history_time: 0.5  # [s]
          buffer_size: 10
        latency: 0.3

      filter:
        min_velocity: 1.0  # [m/s]
        moving_time: 0.5  # [s]
