# DO NOT EDIT THIS FILE DIRECTLY FOR ADDING OR REMOVING FIELDS. Follow these steps:
#
# 1. Modify the param file in the upstream repository.
# 2. Run the sync-params workflow or run `python .github/scripts/sync_params.py perception` to update this file.
# 3. If local changes are needed, annotate them with an override marker (see below).
#
# Keys marked with '{OVERRIDE}' or '# {OVERRIDE: reason}' are persisted as variant overrides.
# 'reason' can be any single-line text without braces.
# To keep local changes, annotate fields with '# {OVERRIDE}' or '# {OVERRIDE: reason}'.
#
# Source: https://github.com/autowarefoundation/autoware_universe/blob/cd30d18d9bdc7f91c5b04cc1a5c53262a978779b/perception/autoware_probabilistic_occupancy_grid_map/config/laserscan_based_occupancy_grid_map.param.yaml

/**:
  ros__parameters:
    map_frame: "map"
    base_link_frame: "base_link"
    # center of the grid map
    gridmap_origin_frame: "base_link"
    # ray-tracing center: main sensor frame is preferable like: "velodyne_top"
    scan_origin_frame: "base_link"

    height_filter:
      use_height_filter: true
      min_height: -1.0
      max_height: 2.0

    enable_single_frame_mode: false
    map_length: 150.0
    map_width: 150.0
    map_resolution: 0.5

    # debug parameters
    publish_processing_time_detail: false
