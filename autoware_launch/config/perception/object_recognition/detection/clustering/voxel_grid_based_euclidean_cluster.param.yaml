/**:
  ros__parameters:
    tolerance_m: 0.7
    voxel_leaf_size_m: 0.3
    min_points_per_voxel: 1
    min_points_per_cluster: 10
    max_voxels_per_cluster: 800  # split bound: clusters above this voxel count are split into smaller sections (not dropped)
    # Voxel Counts (0.3m*0.3m voxel, ignoring height):
    # Based on Japanese vehicle size regulations:
    # - Regular truck: 12m x 2.5m = ~333 voxels
    # - Semi-trailer: 16.5m x 2.5m = ~458 voxels
    # - Full trailer: 25m x 2.5m = ~694 voxels
    # Adding 15% margin for safety: 694 * 1.15 ~ 800
    # Lower max_voxels_per_cluster (above) to force large groups to be cut into smaller sections.
    large_cluster_voxel_count_threshold: 65  # Clusters below this number of voxels are exempt from per-voxel filtering
    # This threshold is based on a medium-sized truck (5.0m x 1.8m).
    # Its full footprint covers about 100 voxels (0.3m x 0.3m grid),
    # but LiDAR typically captures only ~60–70% due to occlusion.
    large_cluster_max_points_per_voxel: 10  # Max points allowed per voxel in a large cluster
    use_height: false
    input_frame: "base_link"

    # low height crop box filter param
    max_x: 200.0
    min_x: -200.0
    max_y: 200.0
    min_y: -200.0
    max_z: 4.0
    min_z: -10.0
    negative: false
    processing_time_threshold_sec: 0.01
