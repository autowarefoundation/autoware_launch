# This file is managed by workflow.
# Keys marked with '*OVERRIDE*' are persisted as variant overrides.
# If you want to modify a field, make sure that the field has comment including -> # *OVERRIDE*
#
# Source: https://github.com/autowarefoundation/autoware_universe/blob/b4593ce29d84b5a35165e1c15b6bcbbe3cd0227c/perception/autoware_bevfusion/config/bevfusion_lidar.param.yaml
# Reference in this repository: .config-sync/perception/autoware_bevfusion/config/bevfusion_lidar.param.yaml

/**:
  ros__parameters:
    # non-network params
    max_camera_lidar_delay: 0.0
    # plugins
    plugins_path: $(find-pkg-share autoware_tensorrt_plugins)/plugins/libautoware_tensorrt_plugins.so
    # network
    trt_precision: fp16
    cloud_capacity: 2000000
    onnx_path: "$(var model_path)/bevfusion_lidar.onnx"
    engine_path: "$(var model_path)/bevfusion_lidar.engine"

    # image backbone network (lidar-only mode enabled when all three parameters are empty)
    image_backbone_onnx_path: ""
    image_backbone_engine_path: ""
    image_backbone_trt_precision: ""

    # pre-process params
    densification_num_past_frames: 1
    densification_world_frame_id: map
    run_image_undistortion: false

    # post-process params
    circle_nms_dist_threshold: 0.5
    iou_nms_search_distance_2d: 10.0
    iou_nms_threshold: 0.1
    yaw_norm_thresholds: [0.3, 0.3, 0.3, 0.3, 0.0] # refers to the class_names
    score_threshold: 0.1
