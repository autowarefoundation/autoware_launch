#
# 1. Modify the param file in the upstream repository.
# 2. Run the sync-params workflow or run `python .github/scripts/sync_params.py perception` to update this file.
# 3. If local changes are needed, annotate them with an override marker (see below).
#
# Keys marked with '{OVERRIDE}' or '# {OVERRIDE: reason}' are persisted as variant overrides.
# 'reason' can be any single-line text without braces.
# To keep local changes, annotate fields with '# {OVERRIDE}' or '# {OVERRIDE: reason}'.
#
# Source: https://github.com/autowarefoundation/autoware_universe/blob/80d5c9d28ffe0d6a5d36bd08f3b4154b7e007b2b/perception/autoware_bevfusion/config/bevfusion_camera_lidar.param.yaml

/**:
  ros__parameters:
    # non-network params
    max_camera_lidar_delay: 0.12
    # plugins
    plugins_path: $(find-pkg-share autoware_tensorrt_plugins)/plugins/libautoware_tensorrt_plugins.so
    # network
    trt_precision: fp16
    cloud_capacity: 2000000
    onnx_path: "$(var model_path)/bevfusion_camera_lidar.onnx"
    engine_path: "$(var model_path)/bevfusion_camera_lidar.engine"

    # image backbone network (fusion mode enabled when all three parameters are non-empty)
    image_backbone_onnx_path: "$(var model_path)/bevfusion_image_backbone.onnx"
    image_backbone_engine_path: "$(var model_path)/bevfusion_image_backbone.engine"
    image_backbone_trt_precision: fp16

    # pre-process params
    densification_num_past_frames: 1
    densification_world_frame_id: map
    run_image_undistortion: true

    # post-process params
    circle_nms_dist_threshold: 0.5
    iou_nms_search_distance_2d: 10.0
    iou_nms_threshold: 0.1
    yaw_norm_thresholds: [0.3, 0.3, 0.3, 0.3, 0.0, 0.0, 0.0] # refers to the class_names

    detection_score_thresholds:
        # Upper bound of radial distance of 3d center_x and center_y in bounding boxes, and starting from 0
        # [0-50m), [50.0-90m), [90.0-121.0m), [121.0-200.0m), set a very high number for the last one to be safe
        distance_bin_upper_limits: [50.0, 90.0, 121.0, 200.0]
        # Each list of thresholds must match with the number of upper_bounds, and each threshold corresponds to a distance bucket in the order of the upper bounds
        min_confidence_scores:
          CAR: [0.10, 0.10, 0.10, 0.10]
          TRUCK: [0.10, 0.10, 0.10, 0.10]
          BUS: [0.10, 0.10, 0.10, 0.10]
          BICYCLE: [0.10, 0.10, 0.10, 0.10]
          PEDESTRIAN: [0.10, 0.10, 0.10, 0.10]
          TRAFFIC_CONE: [0.10, 0.10, 0.10, 0.10]
          BARRIER: [0.10, 0.10, 0.10, 0.10]
