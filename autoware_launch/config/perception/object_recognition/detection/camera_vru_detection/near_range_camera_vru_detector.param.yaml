# This file is managed by workflow.
# Keys marked with '*OVERRIDE*' are persisted as variant overrides.
# If you want to modify a field, make sure that the field has comment including -> # *OVERRIDE*
#
# Source: https://github.com/autowarefoundation/autoware_universe/blob/26f9914ec4f1ee53744bb55c039d75f5507353a9/perception/autoware_image_object_locator/config/bbox_object_locator.param.yaml
# Reference in this repository: .config-sync/perception/autoware_image_object_locator/config/bbox_object_locator.param.yaml

/**:
  ros__parameters:
    target_frame: "base_link"
    detection_target_class:
      UNKNOWN : false
      CAR : false
      TRUCK : false
      BUS : false
      TRAILER : false
      MOTORCYCLE : false
      BICYCLE : false
      PEDESTRIAN : true

    roi_confidence_threshold: 0.80 # [0.0, 1.0]
    roi_truncation_validation:
      enabled: [false, false, false, false, false, false, false, false]
      remove_truncated: [false, false, false, false, false, false, false, false]
      image_border_truncation_horizontal_margin_ratio: 0.0 # [0.0, 0.5]
      image_border_truncation_vertical_margin_ratio: 0.0 # [0.0, 0.5]

    # if an object is detected farther than this, it will be filtered out
    detection_max_range: 10.0 # [m]
    # if object height is unavailable, this will be used instead
    pseudo_height: 1.5 # [m]

    pedestrian_detection_config:
      width_min: 0.5 # [m]
      width_max: 0.8 # [m]
