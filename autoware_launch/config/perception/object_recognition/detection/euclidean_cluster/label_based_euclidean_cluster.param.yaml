/**:
  ros__parameters:
    # Euclidean clustering
    use_height: false
    tolerance_m: 0.65
    voxel_leaf_size_m: 0.2
    min_points_per_voxel: 3
    min_points_per_cluster: 10
    large_cluster_voxel_count_threshold: 50
    large_cluster_max_points_per_voxel: 100
    max_voxels_per_cluster: 2000

    # Per-label clustering parameter overrides. Any omitted key falls back to the global default.
    label_cluster_params:
      pedestrian:
        tolerance_m: 0.3
        voxel_leaf_size_m: 0.1
        min_points_per_voxel: 1
        min_points_per_cluster: 3
        large_cluster_voxel_count_threshold: 5
        large_cluster_max_points_per_voxel: 30
        max_voxels_per_cluster: 200
      bicycle:
        tolerance_m: 0.4
        voxel_leaf_size_m: 0.15
        min_points_per_voxel: 1
        min_points_per_cluster: 5
        large_cluster_voxel_count_threshold: 5
        large_cluster_max_points_per_voxel: 50
        max_voxels_per_cluster: 300
      hazard:
        tolerance_m: 0.3
        voxel_leaf_size_m: 0.1
        min_points_per_voxel: 1
        min_points_per_cluster: 3
        large_cluster_voxel_count_threshold: 5
        large_cluster_max_points_per_voxel: 30
        max_voxels_per_cluster: 200

    # Post-clustering merge for confusable label pairs. Omit this block to disable.
    confusable_label_groups:
      truck_trailer:
        labels: ["truck", "trailer"]
        cross_label_tolerance_m: 0.5
        max_merged_size_m: 25.0

    # Point filtering by semantic confidence
    min_probability: 0.3

    # Semantic label selection and mapping
    # YAML declaration order is treated as the input class_id order.
    # cspell:ignore pullable
    class_names: # {OVERRIDE}
      car: car
      truck: truck
      bus: bus
      bicycle: bicycle
      pedestrian: pedestrian
      traffic_cone: hazard
      barrier: hazard
      debris: hazard
      drivable_flat: ignore
      non_drivable_flat: ignore
      vegetation: ignore
      building: ignore
      vertical_thin: hazard
      static_clutter: ignore
      noise: ignore

    # Shape estimation behavior
    use_shape_estimation_corrector: false
    use_shape_estimation_filter: false
    use_boost_bbox_optimizer: false
    # 0: ALL_POLYGON, 1: LABEL_DEPEND
    shape_policy: 0
