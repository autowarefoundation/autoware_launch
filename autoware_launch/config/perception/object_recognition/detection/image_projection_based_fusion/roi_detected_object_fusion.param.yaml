       0,       1,   1,     1,   1,       0,         0,       0,         # TRUCK
       0,       1,   1,     1,   1,       0,         0,       0,         # BUS
       0,       1,   1,     1,   1,       0,         0,       0,         # TRAILER
       0,       0,   0,     0,   0,       1,         1,       1,         # MOTORBIKE
       0,       0,   0,     0,   0,       1,         1,       1,         # BICYCLE
