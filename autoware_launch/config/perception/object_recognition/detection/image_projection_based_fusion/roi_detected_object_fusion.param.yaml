    can_assign_matrix:
      #UNKNOWN, CAR, TRUCK, BUS, TRAILER, MOTORBIKE, BICYCLE, PEDESTRIAN <-roi_msg
      [1,       0,   0,     0,   0,       0,         0,       0,         # UNKNOWN <-detected_objects
