# This file is managed by workflow.
# Keys marked with '{OVERRIDE}' or '# {OVERRIDE: reason}' are persisted as variant overrides.
# 'reason' can be any single-line text without braces.
# To keep local changes, annotate fields with '# {OVERRIDE}' or '# {OVERRIDE: reason}'.
#
# Source: https://github.com/autowarefoundation/autoware_universe/blob/7f5a7f06318cda64ba53782f9b53ad949c05656b/perception/autoware_detected_object_validation/config/tracked_object_lanelet_filter.param.yaml

/**:
  ros__parameters:
    filter_target_label:
      UNKNOWN : true
      CAR : true # {OVERRIDE}
      TRUCK : true # {OVERRIDE}
      BUS : true # {OVERRIDE}
      TRAILER : true # {OVERRIDE}
      MOTORCYCLE : true # {OVERRIDE}
      BICYCLE : true # {OVERRIDE}
      PEDESTRIAN : true # {OVERRIDE}

    filter_settings:
      # polygon overlap based filter
      lanelet_xy_overlap_filter:
        enabled: true

      # velocity direction based filter
      lanelet_direction_filter:
        enabled: true # {OVERRIDE}
        velocity_yaw_threshold: 0.785398 # [rad] (45 deg)
        object_speed_threshold: 3.0 # [m/s]

      # object's elevation from lanelet based filter
      lanelet_object_elevation_filter:
        enabled: true # {OVERRIDE}
        max_elevation_threshold: 3.0 # {OVERRIDE: [m] from a lanelet's surface}
        min_elevation_threshold: -0.5 # {OVERRIDE: [m] from a lanelet's surface}

      lanelet_extra_margin: 0.0
      debug: false

