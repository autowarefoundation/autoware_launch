# This file is managed by sync-params workflow.
# Keys marked with '{OVERRIDE}' or '# {OVERRIDE: reason}' are persisted as variant overrides.
# 'reason' can be any single-line text without braces.
# To keep local changes, annotate fields with '# {OVERRIDE}' or '# {OVERRIDE: reason}'.
#
# Source: https://github.com/autowarefoundation/autoware_universe/blob/104be4474e94652ab0e7328bc0f5f380a584425f/perception/autoware_multi_object_tracker/config/data_association_matrix.param.yaml

/**:
  ros__parameters:
    # tracker_assignment: unified (shape, label) → {create, match}.
    # 'create': which tracker to spawn for a new detection.
    # 'match':  ordered list of tracker types eligible for association.
    # Each (shape, label) should be listed explicitly.
    # create: "null" — explicitly not accepted: silently ignored at runtime.
    # Omitted entries — implicitly not accepted: a throttled error is emitted at runtime.
    tracker_assignment:
      bounding_box:
        unknown:    {create: general_vehicle_tracker,          match: [general_vehicle_tracker, pedestrian_and_bicycle_tracker]}
        car:        {create: general_vehicle_tracker,          match: [general_vehicle_tracker]}
        truck:      {create: general_vehicle_tracker,          match: [general_vehicle_tracker]}
        bus:        {create: general_vehicle_tracker,          match: [general_vehicle_tracker]}
        trailer:    {create: general_vehicle_tracker,          match: [general_vehicle_tracker]}
        motorcycle: {create: pedestrian_and_bicycle_tracker, match: [pedestrian_and_bicycle_tracker]}
        bicycle:    {create: pedestrian_and_bicycle_tracker, match: [pedestrian_and_bicycle_tracker]}
        pedestrian: {create: pedestrian_and_bicycle_tracker, match: [pedestrian_and_bicycle_tracker]}
        animal:     {create: "null"}
        hazard:     {create: static_tracker,                 match: [static_tracker]}
      polygon:
        unknown:    {create: polygon_tracker,                match: [polygon_tracker, static_tracker, general_vehicle_tracker, pedestrian_and_bicycle_tracker]}
        car:        {create: polygon_tracker,                match: [polygon_tracker, general_vehicle_tracker]}
        truck:      {create: polygon_tracker,                match: [polygon_tracker, general_vehicle_tracker]}
        bus:        {create: polygon_tracker,                match: [polygon_tracker, general_vehicle_tracker]}
        trailer:    {create: polygon_tracker,                match: [polygon_tracker, general_vehicle_tracker]}
        motorcycle: {create: pedestrian_and_bicycle_tracker, match: [pedestrian_and_bicycle_tracker]}
        bicycle:    {create: pedestrian_and_bicycle_tracker, match: [pedestrian_and_bicycle_tracker]}
        pedestrian: {create: pedestrian_and_bicycle_tracker, match: [pedestrian_and_bicycle_tracker]}
        animal:     {create: polygon_tracker,                match: [polygon_tracker]}
        hazard:     {create: static_tracker,                 match: [static_tracker]}
      cylinder:
        unknown:    {create: "null"}
        car:        {create: "null"}
        truck:      {create: "null"}
        bus:        {create: "null"}
        trailer:    {create: "null"}
        motorcycle: {create: pedestrian_and_bicycle_tracker, match: [pedestrian_and_bicycle_tracker]}
        bicycle:    {create: pedestrian_and_bicycle_tracker, match: [pedestrian_and_bicycle_tracker]}
        pedestrian: {create: pedestrian_and_bicycle_tracker, match: [pedestrian_and_bicycle_tracker]}
        animal:     {create: "null"}
        hazard:     {create: static_tracker,                 match: [static_tracker]}

    # Tracker profiles: each tracker type defines its association thresholds per label.
    # Only labels where the tracker is actually used are listed.
    tracker_profiles:
      general_vehicle_tracker:
        bounding_box:
          unknown:  {max_dist: 4.0, max_area: 60.0,  min_area: 3.6,   min_iou: 0.0001}
          car:      {max_dist: 5.0, max_area: 12.10, min_area: 3.6,   min_iou: 0.0001}
          truck:    {max_dist: 5.0, max_area: 36.00, min_area: 6.0,   min_iou: 0.10}
          bus:      {max_dist: 5.0, max_area: 60.00, min_area: 10.0,  min_iou: 0.10}
          trailer:  {max_dist: 5.0, max_area: 60.00, min_area: 10.0,  min_iou: 0.10}
        polygon:
          unknown:  {max_dist: 4.0, max_area: 75.0,  min_area: 0.01,   min_iou: 0.0001}
          car:      {max_dist: 4.0, max_area: 75.0,  min_area: 0.01,   min_iou: 0.0001}
          truck:    {max_dist: 4.0, max_area: 75.0,  min_area: 0.01,   min_iou: 0.0001}
          bus:      {max_dist: 4.0, max_area: 75.0,  min_area: 0.01,   min_iou: 0.0001}
          trailer:  {max_dist: 4.0, max_area: 75.0,  min_area: 0.01,   min_iou: 0.0001}
      pedestrian_and_bicycle_tracker:
        bounding_box:
          unknown:    {max_dist: 3.0, max_area: 3.5,  min_area: 0.01, min_iou: 0.0001}
          motorcycle: {max_dist: 3.0, max_area: 3.5, min_area: 0.1,   min_iou: -0.30}
          bicycle:    {max_dist: 3.0, max_area: 3.5, min_area: 0.1,   min_iou: 0.0001}
          pedestrian: {max_dist: 2.0, max_area: 3.0, min_area: 0.1,   min_iou: 0.0001}
        cylinder:
          motorcycle: {max_dist: 3.0, max_area: 3.5, min_area: 0.1,   min_iou: -0.30}
          bicycle:    {max_dist: 3.0, max_area: 3.5, min_area: 0.1,   min_iou: 0.0001}
          pedestrian: {max_dist: 2.0, max_area: 3.0, min_area: 0.1,   min_iou: 0.0001}
        polygon:
          unknown:    {max_dist: 3.0, max_area: 3.5,  min_area: 0.01, min_iou: 0.0001}
          motorcycle: {max_dist: 3.0, max_area: 3.5,  min_area: 0.01, min_iou: 0.0001}
          bicycle:    {max_dist: 3.0, max_area: 3.5,  min_area: 0.01, min_iou: 0.0001}
          pedestrian: {max_dist: 3.0, max_area: 3.0,  min_area: 0.01, min_iou: 0.0001}
      polygon_tracker:
        polygon:
          unknown:    {max_dist: 4.0, max_area: 100.0, min_area: 0.0, min_iou: 0.0001}
          car:        {max_dist: 5.0, max_area: 100.0, min_area: 0.0, min_iou: 0.0001}
          truck:      {max_dist: 5.0, max_area: 100.0, min_area: 0.0, min_iou: 0.0001}
          bus:        {max_dist: 5.0, max_area: 100.0, min_area: 0.0, min_iou: 0.0001}
          trailer:    {max_dist: 5.0, max_area: 100.0, min_area: 0.0, min_iou: 0.0001}
          motorcycle: {max_dist: 3.0, max_area: 3.5,   min_area: 0.0, min_iou: -0.30}
          bicycle:    {max_dist: 3.0, max_area: 3.5,   min_area: 0.0, min_iou: 0.0001}
          pedestrian: {max_dist: 2.0, max_area: 3.0,   min_area: 0.0, min_iou: 0.0001}
          animal:     {max_dist: 3.0, max_area: 3.5,   min_area: 0.0, min_iou: 0.0001}
          hazard:     {max_dist: 3.0, max_area: 3.5,   min_area: 0.0, min_iou: 0.0001}
      static_tracker:
        bounding_box:
          hazard:     {max_dist: 2.0, max_area: 2.6,  min_area: 0.001, min_iou: 0.0001}
        cylinder:
          hazard:     {max_dist: 2.0, max_area: 2.6,  min_area: 0.001, min_iou: 0.0001}
        polygon:
          hazard:     {max_dist: 2.0, max_area: 2.6,  min_area: 0.001, min_iou: 0.0001}
          unknown:    {max_dist: 2.0, max_area: 2.6,  min_area: 0.001, min_iou: 0.0001}

    unknown_association_giou_threshold: -0.8  # GIoU threshold for unknown-unknown association
