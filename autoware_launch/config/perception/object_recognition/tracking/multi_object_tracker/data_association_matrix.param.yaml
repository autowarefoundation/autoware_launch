# This file is managed by sync-params workflow.
# Keys marked with '{OVERRIDE}' or '# {OVERRIDE: reason}' are persisted as variant overrides.
# 'reason' can be any single-line text without braces.
# To keep local changes, annotate fields with '# {OVERRIDE}' or '# {OVERRIDE: reason}'.
#
# Source: https://github.com/autowarefoundation/autoware_universe/blob/104be4474e94652ab0e7328bc0f5f380a584425f/perception/autoware_multi_object_tracker/config/data_association_matrix.param.yaml

/**:
  ros__parameters:
    # tracker_assignment: unified (shape, label) → {create, match}.
    # 'create': which tracker to spawn for a new detection (was initial_tracker).
    # 'match':  ordered list of tracker types eligible for association (was can_assign).
    # Label-level entries apply to all shapes; shape blocks override only where listed.
    # pass_through_tracker entries omit 'match' (no profile, no association needed).
    tracker_assignment:
      # label-level defaults
      unknown:    {create: polygon_tracker,                match: [polygon_tracker, multi_vehicle_tracker, pedestrian_and_bicycle_tracker]}
      car:        {create: multi_vehicle_tracker,          match: [multi_vehicle_tracker]}
      truck:      {create: multi_vehicle_tracker,          match: [multi_vehicle_tracker]}
      bus:        {create: multi_vehicle_tracker,          match: [multi_vehicle_tracker]}
      trailer:    {create: multi_vehicle_tracker,          match: [multi_vehicle_tracker]}
      motorcycle: {create: pedestrian_and_bicycle_tracker, match: [pedestrian_and_bicycle_tracker]}
      bicycle:    {create: pedestrian_and_bicycle_tracker, match: [pedestrian_and_bicycle_tracker]}
      pedestrian: {create: pedestrian_and_bicycle_tracker, match: [pedestrian_and_bicycle_tracker]}
      # shape-specific overrides
      polygon:
        car:        {create: polygon_tracker,                match: [polygon_tracker, multi_vehicle_tracker]}
        truck:      {create: polygon_tracker,                match: [polygon_tracker, multi_vehicle_tracker]}
        bus:        {create: polygon_tracker,                match: [polygon_tracker, multi_vehicle_tracker]}
        trailer:    {create: polygon_tracker,                match: [polygon_tracker, multi_vehicle_tracker]}
        motorcycle: {create: pedestrian_and_bicycle_tracker, match: [polygon_tracker, pedestrian_and_bicycle_tracker]}
        bicycle:    {create: pedestrian_and_bicycle_tracker, match: [polygon_tracker, pedestrian_and_bicycle_tracker]}
        pedestrian: {create: pedestrian_and_bicycle_tracker, match: [polygon_tracker, pedestrian_and_bicycle_tracker]}
      bounding_box:
        unknown:    {create: multi_vehicle_tracker,          match: [multi_vehicle_tracker, pedestrian_and_bicycle_tracker]}
      cylinder:
        unknown:    {create: pedestrian_and_bicycle_tracker, match: [pedestrian_and_bicycle_tracker]}

    # Tracker profiles: each tracker type defines its association thresholds per label.
    # Only labels where the tracker is actually used are listed.
    # pass_through_tracker has no thresholds — association is bypassed entirely.
    tracker_profiles:
      multi_vehicle_tracker:
        unknown:  {max_dist: 4.0, max_area: 60.0,  min_area: 3.6,   min_iou: 0.0001}
        car:      {max_dist: 5.0, max_area: 12.10, min_area: 3.6,   min_iou: 0.0001}
        truck:    {max_dist: 5.0, max_area: 36.00, min_area: 6.0,   min_iou: 0.10}
        bus:      {max_dist: 5.0, max_area: 60.00, min_area: 10.0,  min_iou: 0.10}
        trailer:  {max_dist: 5.0, max_area: 60.00, min_area: 10.0,  min_iou: 0.10}
      pedestrian_and_bicycle_tracker:
        unknown:    {max_dist: 3.0, max_area: 2.5,  min_area: 0.001, min_iou: 0.0001}
        motorcycle: {max_dist: 3.0, max_area: 2.50, min_area: 0.1,   min_iou: -0.30}
        bicycle:    {max_dist: 3.0, max_area: 2.50, min_area: 0.1,   min_iou: 0.0001}
        pedestrian: {max_dist: 2.0, max_area: 2.00, min_area: 0.1,   min_iou: 0.0001}
      polygon_tracker:
        unknown:    {max_dist: 4.0, max_area: 100.0, min_area: 0.0, min_iou: 0.0001}
        car:        {max_dist: 5.0, max_area: 100.0, min_area: 0.0, min_iou: 0.0001}
        truck:      {max_dist: 5.0, max_area: 100.0, min_area: 0.0, min_iou: 0.0001}
        bus:        {max_dist: 5.0, max_area: 100.0, min_area: 0.0, min_iou: 0.0001}
        trailer:    {max_dist: 5.0, max_area: 100.0, min_area: 0.0, min_iou: 0.0001}
        motorcycle: {max_dist: 3.0, max_area: 2.50,  min_area: 0.0, min_iou: -0.30}
        bicycle:    {max_dist: 3.0, max_area: 2.50,  min_area: 0.0, min_iou: 0.0001}
        pedestrian: {max_dist: 2.0, max_area: 2.00,  min_area: 0.0, min_iou: 0.0001}

    unknown_association_giou_threshold: -0.8  # GIoU threshold for unknown-unknown association
