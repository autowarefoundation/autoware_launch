# Source: https://github.com/autowarefoundation/autoware_universe/blob/82bf9b20f9b1a0847451a003a4410ae965c75652/perception/autoware_multi_object_tracker/config/multi_object_tracker_node.param.yaml

/**:
  ros__parameters:
    # default tracker node parameters
    world_frame_id: map
    ego_frame_id: base_link

    # publish-trigger
    publish_on_timer: true # {OVERRIDE}
    publish_rate: 10.0

    # ego pose source: "tf" (look up from TF tree) or "odometry" (interpolate from ~/input/odometry)
    ego_source: tf
    # delay compensation, least -> most:
    # "none" | "publish_delay" (detection + update->publish delay) | "odometry" (up to latest odometry) | "full" (to now)
    delay_compensation: full # {OVERRIDE}

    consider_odometry_uncertainty: false

    # Per-tracker-type configuration
    tracker_configs:
      polygon_tracker:
        enable_velocity_estimation: true
        enable_motion_output:
          unknown:    false
          car:        true
          truck:      true
          bus:        true
          trailer:    true
          motorcycle: true
          bicycle:    true
          pedestrian: true
          animal:     true
          hazard:     false
      static_tracker:
        convert_polygon_to_bbox: false # convert POLYGON shape to BOUNDING_BOX at publish time

    # pruning parameters
    min_known_object_removal_iou: 0.1  # [ratio]
    min_unknown_object_removal_iou: 0.001  # [ratio]
    pruning_generalized_iou_threshold: 0.1  # [ratio]
    pruning_distance_thresholds:
      unknown: 9.0
      car: 5.0
      truck: 9.0
      bus: 9.0
      trailer: 9.0
      motorcycle: 4.0
      bicycle: 3.0
      pedestrian: 2.0
      animal: 2.0
      hazard: 2.0

    # debug parameters
    publish_processing_time: true # {OVERRIDE}
    publish_processing_time_detail: false
    publish_tentative_objects: false
    publish_debug_markers: false
    diagnostics_warn_delay: 0.5      # [sec]
    diagnostics_error_delay: 1.0     # [sec]
    diagnostics_warn_extrapolation: 0.5      # [sec]
    diagnostics_error_extrapolation: 1.0      # [sec]
