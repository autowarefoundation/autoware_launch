name: roscope resolve check

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: 0 6 * * * # daily 6 AM UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ROSCOPE_SEMVER: 0.2.0

jobs:
  resolve:
    name: Resolve (dry-run build)
    runs-on: ubuntu-24.04
    container: ros:jazzy
    timeout-minutes: 30
    steps:
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            curl \
            git \
            python3-yaml \
            ros-dev-tools

      - name: Initialize rosdep
        run: |
          rosdep init 2>/dev/null || true
          rosdep update
        shell: bash

      - name: Install roscope
        shell: bash
        run: |
          # CI assumption: Ubuntu 24.04 amd64.
          curl -fsSL "https://github.com/paulsohn/roscope/releases/download/v${ROSCOPE_SEMVER}/roscope_${ROSCOPE_SEMVER}-1_all.deb" \
            -o /tmp/roscope.deb
          apt-get install -y /tmp/roscope.deb

          roscope --version

      # Checkout ci_depends.repos and ML param assets from this repo.
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            ci_depends.repos
            .github/assets/autoware_data
          sparse-checkout-cone-mode: false
          path: checkout

      - name: Install Autoware ML param files
        run: cp -r checkout/.github/assets/autoware_data "$HOME/autoware_data"

      # For PRs (including from forks): rewrite the autoware_launch entry
      # to point at the PR head repo/branch instead of main.
      - name: Patch ci_depends.repos for PR
        if: github.event_name == 'pull_request'
        shell: python3 {0}
        run: |
          import yaml

          with open("checkout/ci_depends.repos") as f:
              data = yaml.safe_load(f)

          entry = data["repositories"]["launcher/autoware_launch"]
          entry["url"] = "${{ github.event.pull_request.head.repo.clone_url }}"
          entry["version"] = "${{ github.event.pull_request.head.sha }}"

          with open("checkout/ci_depends.repos", "w") as f:
              yaml.dump(data, f, default_flow_style=False)

          print(f"Patched autoware_launch: {entry['url']} @ {entry['version']}")

      - name: Prepare workspace
        run: |
          mkdir -p ws
          cp checkout/ci_depends.repos ws/ci_depends.repos

      - name: Index
        working-directory: ws
        run: |
          roscope index ci_depends.repos
          cat manifest.lock.repos

      - name: Resolve (dry-run build)
        working-directory: ws
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          roscope build \
            autoware_launch autoware.launch.xml \
            sensor_model:=sample_sensor_kit \
            vehicle_model:=sample_vehicle \
            map_path:=/placeholder/map_path \
            --rosdep --dry-run
