name: check-params

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve-categories:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Build category matrix from config
        id: build-matrix
        run: |
          set -euo pipefail
          matrix_json="$(yq -o=json -I=0 '. | keys' .github/sync-params.yaml)"
          echo "matrix=${matrix_json}" >> "${GITHUB_OUTPUT}"
          echo "Selected categories: ${matrix_json}"

  check-params:
    needs: resolve-categories
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        category: ${{ fromJson(needs.resolve-categories.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruamel.yaml

      - name: Check params
        run: python .github/scripts/sync_params.py --check ${{ matrix.category }}
