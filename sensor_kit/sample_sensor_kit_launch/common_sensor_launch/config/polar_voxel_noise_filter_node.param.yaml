/**:
  ros__parameters:
    # Default parameters for Hesai Pandar128E4X, please adjust based on your specific LiDAR model and requirements
    # Core filtering parameters
    radial_resolution_m: 0.6                     # Resolution in radial direction (meters)
    azimuth_resolution_rad: 0.08               # Resolution in azimuth direction (radians)
    elevation_resolution_rad: 0.08             # Resolution in elevation direction (radians)
    voxel_points_threshold: 5                   # Minimum points required per voxel
    min_radius_m: 0.5                            # Minimum radius to consider (meters)
    max_radius_m: 200.0                          # Maximum radius to consider (meters)
    intensity_threshold: 1                     # Maximum intensity threshold for secondary returns (primary returns are not affected)
    avg_intensity_threshold: 0.01                       # Maximum intensity threshold for secondary returns (primary returns are not affected)

    # Return type classification parameters
    use_return_type_classification: false         # Whether to use return type classification
    filter_secondary_returns: false              # Whether to filter secondary returns (keep only primary when true)
    secondary_noise_threshold: 4                 # Threshold for classifying primary vs secondary returns
    primary_return_types: [1, 6, 8, 10]          # Return types considered as primary returns (all others are secondary)

    # Performance and debug control
    publish_noise_cloud: false                    # Generate and publish noise cloud for debugging (true for development)
