autoware_system_design_format: 0.3.0

name: LidarClusteringCameraFusion.module

instances:
  - name: euclidean_cluster
    entity: VoxelGridBasedEuclideanCluster.node
  - name: shape_estimation
    entity: ShapeEstimation.node
  - name: camera_lidar_fusion
    entity: CameraLidarFusion.module

subscribers:
  - name: pointcloud
  - name: rois0
  - name: rois1
  - name: rois2
  - name: rois3
  - name: rois4
  - name: rois5
  - name: rois6
  - name: rois7
  - name: camera_info0
  - name: camera_info1
  - name: camera_info2
  - name: camera_info3
  - name: camera_info4
  - name: camera_info5
  - name: camera_info6
  - name: camera_info7
publishers:
  - name: detected_objects
  - name: cluster_objects

connections:
  - - subscriber.pointcloud
    - euclidean_cluster.subscriber.input_pointcloud

  - - euclidean_cluster.publisher.output_clusters
    - shape_estimation.subscriber.objects
  - - shape_estimation.publisher.objects
    - publisher.cluster_objects

  - - euclidean_cluster.publisher.output_clusters
    - camera_lidar_fusion.subscriber.euclidean_clusters
  - - subscriber.rois*
    - camera_lidar_fusion.subscriber.rois*
  - - subscriber.camera_info*
    - camera_lidar_fusion.subscriber.camera_info*
  - - camera_lidar_fusion.publisher.objects
    - publisher.detected_objects
